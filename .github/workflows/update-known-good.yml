name: Update Known Good Block Numbers

on:
  workflow_dispatch:
    inputs:
      retry:
        description: 'If this is a retry run'
        required: false
        type: boolean
      failed_networks:
        description: 'Failed networks to retry (JSON array of names)'
        required: false
        type: string
  schedule:
    - cron: '0 */6 * * *'

env:
  GH_TOKEN: ${{ github.token }}

permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: write

jobs:
  define-matrix:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    outputs:
      networks: ${{ steps.networks.outputs.networks }}
    steps:
      - uses: actions/checkout@v5
      - name: setup node env
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'yarn'
      - run: yarn --immutable
      - name: Define Networks
        id: networks
        run: |
          ALL_NETWORKS='[{"name":"polkadot","chains":[{"chain":"polkadot","port":9000,"endpoint_var":"POLKADOT_ENDPOINT"},{"chain":"assetHubPolkadot","port":9001,"endpoint_var":"ASSETHUBPOLKADOT_ENDPOINT"},{"chain":"bridgeHubPolkadot","port":9002,"endpoint_var":"BRIDGEHUBPOLKADOT_ENDPOINT"},{"chain":"collectivesPolkadot","port":9003,"endpoint_var":"COLLECTIVESPOLKADOT_ENDPOINT"},{"chain":"coretimePolkadot","port":9004,"endpoint_var":"CORETIMEPOLKADOT_ENDPOINT"},{"chain":"peoplePolkadot","port":9005,"endpoint_var":"PEOPLEPOLKADOT_ENDPOINT"},{"chain":"acala","port":9006,"endpoint_var":"ACALA_ENDPOINT"},{"chain":"hydration","port":9007,"endpoint_var":"HYDRATION_ENDPOINT"},{"chain":"bifrostPolkadot","port":9008,"endpoint_var":"BIFROSTPOLKADOT_ENDPOINT"}]},{"name":"kusama","chains":[{"chain":"kusama","port":9010,"endpoint_var":"KUSAMA_ENDPOINT"},{"chain":"assetHubKusama","port":9011,"endpoint_var":"ASSETHUBKUSAMA_ENDPOINT"},{"chain":"bridgeHubKusama","port":9012,"endpoint_var":"BRIDGEHUBKUSAMA_ENDPOINT"},{"chain":"coretimeKusama","port":9013,"endpoint_var":"CORETIMEKUSAMA_ENDPOINT"},{"chain":"peopleKusama","port":9014,"endpoint_var":"PEOPLEKUSAMA_ENDPOINT"},{"chain":"encointerKusama","port":9015,"endpoint_var":"ENCOINTERKUSAMA_ENDPOINT"},{"chain":"karura","port":9016,"endpoint_var":"KARURA_ENDPOINT"},{"chain":"bifrostKusama","port":9017,"endpoint_var":"BIFROSTKUSAMA_ENDPOINT"}]}]'

          if [ "${{ github.event.inputs.retry }}" == "true" ]; then
            FAILED='${{ github.event.inputs.failed_networks }}'
            FAILED=$(echo "$FAILED" | sed 's/^"\(.*\)"$/\1/')
            FILTERED=$(echo "$ALL_NETWORKS" | jq --argjson failed "$FAILED" '[ .[] | select(.name as $n | $failed | index($n)) ]')
            echo "networks=$FILTERED" >> "$GITHUB_OUTPUT"
          else
            echo "networks=$ALL_NETWORKS" >> "$GITHUB_OUTPUT"
          fi
      - name: Update Known Good Block Numbers
        run: |
          yarn update-known-good
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KNOWN_GOOD_BLOCK_NUMBERS
          path: |
            KNOWN_GOOD_BLOCK_NUMBERS_POLKADOT.env
            KNOWN_GOOD_BLOCK_NUMBERS_KUSAMA.env
          retention-days: 1

  tests:
    needs: define-matrix
    name: "Tests (${{ matrix.network.name }})"
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        network: ${{ fromJSON(needs.define-matrix.outputs.networks) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'yarn'

      - run: yarn --immutable

      - name: Download KNOWN_GOOD_BLOCK_NUMBERS artifact
        uses: actions/download-artifact@v4
        with:
          name: KNOWN_GOOD_BLOCK_NUMBERS

      - name: Source known good block numbers
        run: |
          NETWORK_UPPER=$(echo "${{ matrix.network.name }}" | tr '[:lower:]' '[:upper:]')
          ENV_FILE="KNOWN_GOOD_BLOCK_NUMBERS_${NETWORK_UPPER}.env"
          echo "Sourcing block numbers from $ENV_FILE"
          cat "$ENV_FILE" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get Subway commit hash
        id: subway-commit
        run: echo "hash=$(git ls-remote https://github.com/AcalaNetwork/subway HEAD | cut -f1)" >> $GITHUB_OUTPUT

      - name: Cache Subway binary
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: subway-binary-${{ steps.subway-commit.outputs.hash }}
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Subway
        run: cargo install --git https://github.com/AcalaNetwork/subway

      - name: Start all Subway instances
        run: |
          echo "Starting all Subway instances for ${{ matrix.network.name }}..."

          echo '${{ toJSON(matrix.network.chains) }}' | jq -c '.[]' | while read chain; do
            CHAIN=$(echo $chain | jq -r '.chain')
            PORT=$(echo $chain | jq -r '.port')

            # Get endpoints from pet-chain-endpoints.json
            ENDPOINTS=$(jq -c ".$CHAIN" packages/networks/src/pet-chain-endpoints.json)

            if [ "$ENDPOINTS" = "null" ] || [ -z "$ENDPOINTS" ]; then
              echo "Error: No endpoints found for chain $CHAIN"
              exit 1
            fi

            echo "Starting Subway for $CHAIN on port $PORT..."
            sed -e "s/{{PORT}}/$PORT/g" -e "s|{{ENDPOINTS}}|$ENDPOINTS|g" .github/subway-template.yml > /tmp/subway-$PORT.yml
            subway --config /tmp/subway-$PORT.yml > /tmp/subway-$PORT.log 2>&1 &
            echo $! >> /tmp/subway.pids
          done

          echo "Waiting for all Subway instances to start..."
          echo '${{ toJSON(matrix.network.chains) }}' | jq -c '.[]' | while read chain; do
            PORT=$(echo $chain | jq -r '.port')
            timeout=60
            elapsed=0
            while [ $elapsed -lt $timeout ]; do
              if curl -sf http://127.0.0.1:$PORT/health > /dev/null 2>&1; then
                echo "Subway on port $PORT started successfully!"
                break
              fi
              sleep 1
              elapsed=$((elapsed + 1))
            done

            if [ $elapsed -ge $timeout ]; then
              echo "Timeout waiting for subway on port $PORT"
              cat /tmp/subway-$PORT.log
              exit 1
            fi
          done

          echo "All Subway instances started successfully!"

      - name: Set endpoint environment variables
        run: |
          echo '${{ toJSON(matrix.network.chains) }}' | jq -c '.[]' | while read chain; do
            ENDPOINT_VAR=$(echo $chain | jq -r '.endpoint_var')
            PORT=$(echo $chain | jq -r '.port')
            echo "${ENDPOINT_VAR}=ws://localhost:${PORT}" >> $GITHUB_ENV
          done

      - name: Run ${{ matrix.network.name }} tests
        run: yarn test:${{ matrix.network.name }} --pool=threads --maxWorkers=3 --retry=3

      - name: Cleanup Subway instances
        if: always()
        run: |
          if [ -f /tmp/subway.pids ]; then
            cat /tmp/subway.pids | xargs kill || true
          fi

          for log in /tmp/subway-*.log; do
            if [ -f "$log" ]; then
              echo "=== $log ==="
              tail -20 "$log" || true
            fi
          done

  save:
    needs: tests
    runs-on: ubuntu-latest
    if: success() && github.event.inputs.retry != 'true'
    steps:
    - uses: actions/create-github-app-token@v1
      id: app-token
      with:
        app-id: ${{ secrets.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
    - uses: actions/checkout@v5
      with:
        token: ${{ steps.app-token.outputs.token }}
    - name: Download KNOWN_GOOD_BLOCK_NUMBERS artifact
      uses: actions/download-artifact@v4
      with:
        name: KNOWN_GOOD_BLOCK_NUMBERS
    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add -A 'KNOWN_GOOD_BLOCK_NUMBERS_*.env'
        if ! git diff --cached --quiet; then
          git commit -m "[ci skip] Update known good block numbers"
          git push
        else
          echo "No changes to commit"
        fi

  schedule-retry:
    needs: tests
    if: failure() && github.event.inputs.retry != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Get failed networks
        id: get-failed
        uses: actions/github-script@v8
        with:
          script: |
            const response = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId
              }
            );

            const failedNetworks = response
              .filter(job => job.name.startsWith('Tests (') && job.conclusion === 'failure')
              .map(job => {
                const match = job.name.match(/Tests \((.*)\)/);
                return match ? match[1] : null;
              })
              .filter(Boolean);

            return JSON.stringify(failedNetworks);
      - name: sleep
        run: sleep 300
      - name: Dispatch retry workflow
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'update-known-good.yml',
              ref: 'master',
              inputs: {
                retry: 'true',
                failed_networks: '${{ steps.get-failed.outputs.result }}'
              }
            })

  notify:
    needs: tests
    if: failure() && github.event.inputs.retry == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create Comment
        uses: actions/github-script@v8
        with:
          script: |
            const response = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId
              },
            );

            const failedNetworks = response
              .filter(job => job.name.startsWith('Tests (') && job.conclusion === 'failure')
              .map(job => {
                const match = job.name.match(/Tests \((.*)\)/);
                return match ? match[1] : null;
              })
              .filter(Boolean);

            const { data: config } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows/notifications.json',
              ref: 'master'
            })

            const notifications = JSON.parse(Buffer.from(config.content, 'base64').toString('utf8'))

            const issuesToNotify = new Set()
            for (const network of failedNetworks) {
              issuesToNotify.add(notifications[network] ?? notifications['unknown'])
            }

            for (const issueNumber of issuesToNotify) {
              await github.rest.issues.createComment({
                issue_number: issueNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `Workflow failed: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              })
            }
