name: Debug Acala endpoints

on:
  push:
    branches: [fix-acala-subway-resilience]

jobs:
  test-endpoints:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'yarn'

      - run: yarn --immutable

      - name: Install subway
        run: |
          docker create --name subway-extract acala/subway:v0.1.1
          sudo docker cp subway-extract:/usr/local/bin/subway /usr/local/bin/subway
          docker rm subway-extract
          sudo chmod +x /usr/local/bin/subway

      - name: Source known good block numbers
        run: cat KNOWN_GOOD_BLOCK_NUMBERS_POLKADOT.env >> $GITHUB_ENV

      - name: Start ALL polkadot subway instances (like real CI)
        run: |
          MATRIX='[
            {"chain":"polkadot","port":9000},
            {"chain":"assetHubPolkadot","port":9001},
            {"chain":"bridgeHubPolkadot","port":9002},
            {"chain":"collectivesPolkadot","port":9003},
            {"chain":"coretimePolkadot","port":9004},
            {"chain":"peoplePolkadot","port":9005},
            {"chain":"acala","port":9006},
            {"chain":"astar","port":9007},
            {"chain":"hydration","port":9008},
            {"chain":"bifrostPolkadot","port":9009}
          ]'

          echo "$MATRIX" | jq -c '.[]' | while read chain; do
            CHAIN=$(echo $chain | jq -r '.chain')
            PORT=$(echo $chain | jq -r '.port')
            ENDPOINTS=$(jq -c ".$CHAIN" packages/networks/src/pet-chain-endpoints.json)
            sed -e "s/{{PORT}}/$PORT/g" -e "s|{{ENDPOINTS}}|$ENDPOINTS|g" .github/subway-template.yml > /tmp/subway-$PORT.yml
            subway --config /tmp/subway-$PORT.yml > /tmp/subway-$PORT.log 2>&1 &
          done

          for PORT in 9000 9001 9002 9003 9004 9005 9006 9007 9008 9009; do
            timeout=30
            elapsed=0
            while [ $elapsed -lt $timeout ]; do
              if curl -sf http://127.0.0.1:$PORT/health > /dev/null 2>&1; then
                echo "Port $PORT: OK"
                break
              fi
              sleep 1
              elapsed=$((elapsed + 1))
            done
            if [ $elapsed -ge $timeout ]; then
              echo "Port $PORT: TIMEOUT"
            fi
          done

      - name: Test Acala through subway (isolated, no other load)
        run: |
          echo "=== Single request, no contention ==="
          node -e "
          const WebSocket = require('ws');
          const ws = new WebSocket('ws://localhost:9006');
          const start = Date.now();
          ws.on('open', () => {
            console.log('Connected in ' + (Date.now()-start) + 'ms');
            ws.send(JSON.stringify({jsonrpc:'2.0', method:'chain_getBlockHash', params:[11553958], id:1}));
          });
          ws.on('message', (data) => {
            console.log('Response in ' + (Date.now()-start) + 'ms');
            ws.close();
            process.exit(0);
          });
          ws.on('error', (e) => console.log('Error: ' + e.message));
          setTimeout(() => { console.log('TIMEOUT 30s'); ws.close(); process.exit(1); }, 30000);
          " || echo "FAILED"

      - name: Test Acala through subway (concurrent, simulating vitest workers)
        run: |
          echo "=== 8 concurrent requests through Acala subway ==="
          node -e "
          const WebSocket = require('ws');

          function makeRequest(id) {
            return new Promise((resolve) => {
              const ws = new WebSocket('ws://localhost:9006');
              const start = Date.now();
              const timer = setTimeout(() => { ws.close(); resolve({id, status:'TIMEOUT_30s', ms:Date.now()-start}); }, 30000);
              ws.on('open', () => {
                ws.send(JSON.stringify({jsonrpc:'2.0', method:'chain_getBlockHash', params:[11553958], id:1}));
              });
              ws.on('message', (data) => {
                clearTimeout(timer);
                ws.close();
                resolve({id, status:'OK', ms:Date.now()-start});
              });
              ws.on('error', (e) => { clearTimeout(timer); resolve({id, status:'ERR:'+e.message, ms:Date.now()-start}); });
            });
          }

          async function main() {
            // Fire 8 concurrent requests like 8 vitest workers would
            const promises = [];
            for (let i = 0; i < 8; i++) promises.push(makeRequest(i));
            const results = await Promise.all(promises);
            results.forEach(r => console.log('Worker ' + r.id + ': ' + r.status + ' ' + r.ms + 'ms'));
          }
          main();
          "

      - name: Test ALL chains concurrently (simulating real CI load)
        run: |
          echo "=== Concurrent requests across all 10 chains ==="
          node -e "
          const WebSocket = require('ws');

          function makeRequest(chain, port) {
            return new Promise((resolve) => {
              const ws = new WebSocket('ws://localhost:' + port);
              const start = Date.now();
              const timer = setTimeout(() => { ws.close(); resolve({chain, status:'TIMEOUT_60s', ms:Date.now()-start}); }, 60000);
              ws.on('open', () => {
                ws.send(JSON.stringify({jsonrpc:'2.0', method:'chain_getBlockHash', params:[1000000], id:1}));
              });
              ws.on('message', (data) => {
                clearTimeout(timer);
                ws.close();
                resolve({chain, status:'OK', ms:Date.now()-start});
              });
              ws.on('error', (e) => { clearTimeout(timer); resolve({chain, status:'ERR:'+e.message, ms:Date.now()-start}); });
            });
          }

          async function main() {
            const chains = [
              {name:'polkadot',port:9000}, {name:'assetHub',port:9001},
              {name:'bridgeHub',port:9002}, {name:'collectives',port:9003},
              {name:'coretime',port:9004}, {name:'people',port:9005},
              {name:'acala',port:9006}, {name:'astar',port:9007},
              {name:'hydration',port:9008}, {name:'bifrost',port:9009}
            ];
            // 8 workers per chain, all at once
            const promises = [];
            for (const c of chains) {
              for (let i = 0; i < 8; i++) {
                promises.push(makeRequest(c.name + '[' + i + ']', c.port));
              }
            }
            const results = await Promise.all(promises);
            results.sort((a,b) => a.chain.localeCompare(b.chain));
            results.forEach(r => console.log(r.chain.padEnd(20) + r.status.padEnd(15) + r.ms + 'ms'));
          }
          main();
          "

      - name: Print all subway logs
        if: always()
        run: |
          for PORT in 9000 9001 9002 9003 9004 9005 9006 9007 9008 9009; do
            echo "=== subway-$PORT ==="
            cat /tmp/subway-$PORT.log 2>/dev/null || echo "(no log)"
            echo ""
          done

      - name: Cleanup
        if: always()
        run: pkill subway || true
