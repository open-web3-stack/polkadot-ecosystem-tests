name: Debug Acala endpoints

on:
  push:
    branches: [fix-acala-subway-resilience]

jobs:
  test-endpoints:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install ws
        run: npm install ws

      - name: Install subway
        run: |
          docker create --name subway-extract acala/subway:v0.1.1
          sudo docker cp subway-extract:/usr/local/bin/subway /usr/local/bin/subway
          docker rm subway-extract
          sudo chmod +x /usr/local/bin/subway
          subway --version

      - name: Test with minimal subway config (no substrate_api, no cache)
        run: |
          cat > /tmp/subway-minimal.yml << 'SCFG'
          extensions:
            client:
              endpoints:
                - wss://acala-rpc-0.aca-api.network
              shuffle_endpoints: false
              request_timeout_seconds: 30
            event_bus:
            telemetry:
              provider: none
            server:
              port: 9090
              listen_address: '127.0.0.1'
              max_connections: 100
              request_timeout_seconds: 60
              cors: null
          middlewares:
            methods:
              - upstream
            subscriptions:
              - upstream
          rpcs: substrate
          SCFG

          subway --config /tmp/subway-minimal.yml > /tmp/subway-minimal.log 2>&1 &
          sleep 5

          echo "=== Minimal subway (no cache, no substrate_api) ==="
          node -e "
          const WebSocket = require('ws');
          const ws = new WebSocket('ws://localhost:9090');
          const start = Date.now();
          ws.on('open', () => {
            console.log('Connected in ' + (Date.now()-start) + 'ms');
            ws.send(JSON.stringify({jsonrpc:'2.0', method:'chain_getBlockHash', params:[11553958], id:1}));
          });
          ws.on('message', (data) => {
            console.log('Response in ' + (Date.now()-start) + 'ms');
            console.log(data.toString().substring(0,120));
            ws.close();
            process.exit(0);
          });
          ws.on('error', (e) => console.log('Error: ' + e.message));
          setTimeout(() => { console.log('TIMEOUT 30s'); ws.close(); process.exit(1); }, 30000);
          " || true

          echo ""
          echo "=== Minimal subway log ==="
          cat /tmp/subway-minimal.log
          kill %1 2>/dev/null || true

      - name: Test with full subway config (matching CI)
        run: |
          cat > /tmp/subway-full.yml << 'SCFG'
          extensions:
            client:
              endpoints:
                - wss://acala-rpc-0.aca-api.network
                - wss://rpc-acala.luckyfriday.io
              shuffle_endpoints: false
              request_timeout_seconds: 60
            event_bus:
            substrate_api:
              stale_timeout_seconds: 180
            telemetry:
              provider: none
            cache:
              default_ttl_seconds: 3600
              default_size: 1000
            merge_subscription:
              keep_alive_seconds: 120
            server:
              port: 9091
              listen_address: '127.0.0.1'
              max_connections: 2000
              max_batch_size: 10
              request_timeout_seconds: 240
              http_methods:
                - path: /health
                  method: system_health
                - path: /liveness
                  method: chain_getBlockHash
              cors: null
            rate_limit:
              connection:
                burst: 100
                period_secs: 1
                jitter_up_to_millis: 100
              ip:
                burst: 1000
                period_secs: 10
                jitter_up_to_millis: 100
              use_xff: false
          middlewares:
            methods:
              - response
              - inject_params
              - cache
              - upstream
            subscriptions:
              - merge_subscription
              - upstream
          rpcs: substrate
          SCFG

          subway --config /tmp/subway-full.yml > /tmp/subway-full.log 2>&1 &
          sleep 5
          curl -sf http://127.0.0.1:9091/health && echo "Health: OK" || echo "Health: FAILED"

          echo ""
          echo "=== Full subway config ==="
          node -e "
          const WebSocket = require('ws');
          const ws = new WebSocket('ws://localhost:9091');
          const start = Date.now();
          ws.on('open', () => {
            console.log('Connected in ' + (Date.now()-start) + 'ms');
            ws.send(JSON.stringify({jsonrpc:'2.0', method:'chain_getBlockHash', params:[11553958], id:1}));
          });
          ws.on('message', (data) => {
            console.log('Response in ' + (Date.now()-start) + 'ms');
            console.log(data.toString().substring(0,120));
            ws.close();
            process.exit(0);
          });
          ws.on('error', (e) => console.log('Error: ' + e.message));
          setTimeout(() => { console.log('TIMEOUT 30s'); ws.close(); process.exit(1); }, 30000);
          " || true

          echo ""
          echo "=== Full subway log ==="
          cat /tmp/subway-full.log
          kill %1 2>/dev/null || true
