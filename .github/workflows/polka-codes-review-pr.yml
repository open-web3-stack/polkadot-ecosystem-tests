name: Polka Codes Review PR Handler

on:
  pull_request:
    types: [opened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: review-pr-${{ github.event.inputs.pr_number || github.event.number }}
  cancel-in-progress: true

jobs:
  handle:
    if: github.event_name == 'workflow_dispatch' || contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Process PR
        uses: polka-codes/action@master
        with:
          pr_number: ${{ github.event.inputs.pr_number || github.event.number }}
          review: true
        env:
          POLKA_API_PROVIDER: openai-compatible
          POLKA_BASE_URL: ${{ secrets.POLKA_BASE_URL }}
          POLKA_API_KEY: ${{ secrets.POLKA_API_KEY }}
          POLKA_MODEL: gpt-5.6-sol
          GITHUB_TOKEN: ${{ github.token }}
